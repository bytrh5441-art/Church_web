<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عرض المحاضرات المتعددة</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin:0; padding:0; font-family:'Poppins', sans-serif; }

body {
  min-height: 100vh;
  padding: 40px 20px;
  background: linear-gradient(135deg,#f83600,#f9d423);
  direction: rtl;
}

h1 {
  text-align: center;
  color: #fff;
  margin-bottom: 30px;
  font-size: 36px;
  font-weight: 600;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* الكارد الرئيسي */
.card {
  background: #fff;
  border-radius: 20px;
  padding: 20px 25px;
  cursor: pointer;
  transition: all 0.3s ease;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card:hover { transform: translateY(-5px); }

/* العنوان */
.card-title-wrapper {
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 15px;
}

.card-title {
  font-size: 20px;
  font-weight: 600;
  color: #333;
  text-align: center;
}

.card-date {
  font-size: 12px;
  color: #888;
  margin-top: 5px;
  text-align: center;
}

/* المحتوى */
.card-content-wrapper {
  display: flex;
  flex-direction: row-reverse;
  gap: 15px;
  width: 100%;
}

.card-content {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s ease;
  padding-right: 3px;
  border-right: 3px solid #2a6573;
}

.card.open .card-content {
  max-height: 2000px;
}

/* الكاردات الداخلية */
.inner-card {
  background: #e0e0e0;
  border-radius: 12px 0 0 12px;
  padding: 10px 15px;
  cursor: pointer;
  transition: all 0.3s ease;
  overflow: hidden;
  box-shadow: none !important;
}

.inner-card:hover {
  box-shadow: none !important;
  transform: translateX(0px);
}

.inner-card.open {
  box-shadow: none !important;
}

.inner-card-title {
  font-weight: 600;
  color: #333;
}

.inner-card-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height .5s ease;
  margin-top: 5px;
  text-align: right;
  padding: 0;
  border-radius: 0;
  background: transparent;
  
}

.inner-card.open .inner-card-content {
  max-height: 500px;
  
}

/* 🔥 النص لما يتفتح */
.inner-card.text.open .inner-card-content {
  background: #ececec;
  border-right: 3px solid #1f4461;
  color:#1f4461;
  /* تمدد كامل */
  margin-right: -5px;
  margin-left: -15px;
  margin-bottom: -5px;

  padding: 12px;
  width: calc(93% + 30px);

  border-radius: 10px 0 0 10px;
}
 .inner-card.text{
   color:#1f4461;
   
 }
/* الوسائط */
.inner-card-content img, 
.inner-card-content video, 
.inner-card-content iframe {
  width: 100%;
  border-radius: 10px;
  margin-top: 5px;
}
</style>
</head>
<body>

<h1>المحاضرات</h1>
<div class="container" id="posts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA809gpxrpd1QSlWEH4wCjZHw3_aRai3gA",
  authDomain: "my-site-a4c05.firebaseapp.com",
  projectId: "my-site-a4c05"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadPosts() {
  const querySnapshot = await getDocs(collection(db, "posts"));
  const container = document.getElementById("posts");
  container.innerHTML = "";

  const typeNames = {
    text: "النص",
    image: "الصورة",
    video: "الفيديو",
    pdf: "ملف PDF"
  };

  querySnapshot.forEach((doc) => {
    const post = doc.data();
    const dateStr = post.date ? new Date(post.date).toLocaleString() : null;

    const card = document.createElement("div");
    card.className = "card";

    const headerHTML = `
      <div class="card-title-wrapper">
        <div>
          <div class="card-title">${post.title || "بدون عنوان"}</div>
          ${dateStr ? `<div class="card-date">تاريخ الرفع: ${dateStr}</div>` : ""}
        </div>
      </div>
    `;

    card.innerHTML = headerHTML + `
      <div class="card-content-wrapper">
        <div class="card-content"></div>
      </div>
    `;

    const cardContent = card.querySelector(".card-content");

    if(post.contents){
      for(const [type, value] of Object.entries(post.contents)){
        const inner = document.createElement("div");
        inner.className = "inner-card";

        if(type==="text") inner.classList.add("text");

        const displayName = typeNames[type] || type.toUpperCase();

        inner.innerHTML = `
          <div class="inner-card-title">${displayName}</div>
          <div class="inner-card-content"></div>
        `;

        const innerContent = inner.querySelector(".inner-card-content");

        if(type==="text") innerContent.innerHTML = `<p>${value}</p>`;
        else if(type==="image") innerContent.innerHTML = `<img src="${value}">`;
        else if(type==="video") innerContent.innerHTML = `<video src="${value}" controls></video>`;
        else if(type==="pdf") innerContent.innerHTML = `<iframe src="${value}" style="height:400px;"></iframe>`;

        inner.addEventListener("click", (e)=>{
          e.stopPropagation();
          inner.classList.toggle("open");
          inner.scrollIntoView({behavior:"smooth", block:"start"});
        });

        cardContent.appendChild(inner);
      }
    }

    card.addEventListener("click", () => {
      card.classList.toggle("open");
    });

    container.appendChild(card);
  });
}

loadPosts();
</script>

</body>
</html>
