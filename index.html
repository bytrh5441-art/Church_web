<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عرض المحاضرات المتعددة</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    min-height: 100vh;
    padding: 40px 20px;
    direction: rtl;
    background: linear-gradient(135deg, #050a1c 0%, #0c1e36 100%);
    color: #e0f0ff;
    touch-action: manipulation;
    scroll-behavior: smooth;
  }

  h1 {
    text-align: center;
    color: #00e0ff;
    margin-bottom: 30px;
    font-size: 32px;
    font-weight: 600;
    text-shadow: 0 0 10px rgba(0, 224, 255, 0.4);
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scroll-snap-type: y proximity;
  }

  /* الكارد الرئيسي */
  .card {
    background: #0a1428;
    border-radius: 18px;
    padding: 20px 25px;
    cursor: pointer;
    transition: all 1.1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    border: 1px solid black;
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
    position: relative;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    scroll-snap-align: start;
  }

  
  /* تأثير الـ auto hover */
  .card.auto-hovered {
    transform: translateY(-6px) !important;
    box-shadow: 0 30px 60px rgba(0, 180, 255, 0.40) !important;
    border-color: #00e0ff !important;
    background: rgba(0, 180, 255, 0.1) !important;
    z-index: 10;  
    box-shadow: 15px 30px rgba(0, 0, 0, 0.2);     
  }

  @media (hover: hover) and (pointer: fine) {
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 25px 50px rgba(0, 180, 255, 0.3);
    }
  }

  .card-title-wrapper {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 12px;
  }

  .card-title {
    font-size: 20px;
    font-weight: 600;
    color: #ebebeb;
    text-align: center;
    text-shadow: 0 0 2px rgba(0, 224, 255, 0.1);
    transition: text-shadow 0.6s ease-out;
    transition: transform 0.5s ease-in-out;
  }

  .card.auto-hovered .card-title {
    text-shadow: 0 0 15px rgba(0, 224, 255, 0.3);
      color: #00e0ff;
   transform: scale(1.3);
   }
  
  
  

  .card-date {
    font-size: 12px;
    color: #ebebeb;
    margin-top: 4px;
    text-align: center;
    transition: color 0.6s ease-out;
  }

  .card.auto-hovered .card-date {
    color: #60f0ff;
    
  }

  .card-content-wrapper {
    display: flex;
    flex-direction: row-reverse;
    gap: 15px;
    width: 100%;
  }

  .card-content {
    padding:0 0 0px 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    padding-right: 2px;
    border-right: 3px solid #f5f5dc;
  }
  
  .card.open .card-content {
    max-height: 2000px;
  }

  .inner-card {
    background: #0e1830;
    border-radius: 17px 0 0 0;
    padding: 10px 15px;
    cursor: pointer;
    transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    overflow: hidden;
    border: 1px solid rgba(0, 180, 255, 0.4);
    box-shadow: 0 5px 12px rgba(0, 0, 0, 0.2);
    -webkit-tap-highlight-color: transparent;
  }

  .card:not(.open) .inner-card:hover {
  }

  @media (hover: hover) and (pointer: fine) {
    .card.open .inner-card:hover {
      box-shadow: 0 8px 16px rgba(0, 180, 255, 0.35);
      transform: translateY(-2px);
    }
  }

  .inner-card-title {
    font-weight: 600;
    color: #00e0ff;
  }

  .inner-card-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    margin-top: 5px;
    text-align: right;
    padding: 0;
    border-radius: 0;
    background: transparent;
  }

  .inner-card.open .inner-card-content {
    max-height: 500px;
  }

  .inner-card.text.open .inner-card-content {
    background: rgba(15, 30, 50, 0.82);
    border: .5px solid #00e0ff;
    border-right: 3px solid #00e0ff;
    color: #e0ffff;
    margin-right: -5px;
    margin-left: -15px;
    margin-bottom: -5px;
    padding: 12px;
    width: calc(93% + 30px);
    border-radius: 17px 3px 3px 0;
    box-shadow: 0 5px 12px rgba(0, 0, 0, 0.3);
    box-shadow: inset 0 10px 60px rgba(0, 180, 255, 0.3);
  }

  .inner-card.text {
    color: #9ee0ff;
  }

  .inner-card-content img,
  .inner-card-content video,
  .inner-card-content iframe {
    width: 100%;
    border-radius: 10px;
    margin-top: 5px;
    box-shadow: 0 5px 12px rgba(0, 0, 0, 0.2);
    transition: transform 0.4s ease-out;
  }

  .inner-card-content img:hover,
  .inner-card-content video:hover {
    transform: scale(1.02);
  }

  .inner-card-content video {
    background: #000;
  }
</style>
</head>
<body>

<h1>المحاضرات</h1>
<div class="container" id="posts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA809gpxrpd1QSlWEH4wCjZHw3_aRai3gA",
  authDomain: "my-site-a4c05.firebaseapp.com",
  projectId: "my-site-a4c05"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ متغيرات الـ Auto Hover
let intervalId = null;
let isPaused = false;
let currentIndex = 0;
let cards = [];

function startAutoHover() {
  if (intervalId) {
    clearTimeout(intervalId);
    clearInterval(intervalId);
  }
  
  currentIndex = 0;
  
  const cycle = () => {
    if (isPaused || cards.length === 0) return;
    
    // إزالة الـ hover القديم
    cards.forEach(card => card.classList.remove('auto-hovered'));
    
    // إضافة الـ hover الجديد بسلاسة
    setTimeout(() => {
      if (cards[currentIndex]) {
        cards[currentIndex].classList.add('auto-hovered');
        cards[currentIndex].scrollIntoView({ 
          behavior: "smooth", 
          block: "center",
          inline: "nearest"
        });
      }
    }, 150);
    
    currentIndex = (currentIndex + 1) % cards.length;
    
    // كرر الدورة
    intervalId = setTimeout(cycle, 3000);
  };
  
  // ✅ ابدأ من الكارد الأول فوراً
  cycle();
}

function pauseAutoHover(card) {
  isPaused = true;
  if (intervalId) {
    clearTimeout(intervalId);
    clearInterval(intervalId);
  }
  
  cards.forEach(c => c.classList.remove('auto-hovered'));
  card.classList.add('auto-hovered');
}

async function loadPosts() {
  const querySnapshot = await getDocs(collection(db, "posts"));
  const container = document.getElementById("posts");
  container.innerHTML = "";

  const typeNames = {
    text: "النص",
    image: "الصورة",
    video: "الفيديو",
    pdf: "ملف PDF"
  };

  querySnapshot.forEach((doc) => {
    const post = doc.data();
    const dateStr = post.date ? new Date(post.date).toLocaleString() : null;

    const card = document.createElement("div");
    card.className = "card";

    const headerHTML = `
      <div class="card-title-wrapper">
        <div>
          <div class="card-title">${post.title || "بدون عنوان"}</div>
          ${dateStr ? `<div class="card-date">تاريخ الرفع: ${dateStr}</div>` : ""}
        </div>
      </div>
    `;

    card.innerHTML = headerHTML + `
      <div class="card-content-wrapper">
        <div class="card-content"></div>
      </div>
    `;

    const cardContent = card.querySelector(".card-content");

    if(post.contents){
      for(const [type, value] of Object.entries(post.contents)){
        const inner = document.createElement("div");
        inner.className = "inner-card";

        if(type==="text") inner.classList.add("text");

        const displayName = typeNames[type] || type.toUpperCase();

        inner.innerHTML = `
          <div class="inner-card-title">${displayName}</div>
          <div class="inner-card-content"></div>
        `;

        const innerContent = inner.querySelector(".inner-card-content");

        if(type==="text") innerContent.innerHTML = `<p>${value}</p>`;
        else if(type==="image") innerContent.innerHTML = `<img src="${value}">`;
        else if(type==="video") innerContent.innerHTML = `<video src="${value}" controls></video>`;
        else if(type==="pdf") innerContent.innerHTML = `<iframe src="${value}" style="height:400px;"></iframe>`;

        inner.addEventListener("click", (e)=>{
          e.stopPropagation();
          inner.classList.toggle("open");
          inner.scrollIntoView({behavior:"smooth", block:"start"});
        });

        cardContent.appendChild(inner);
      }
    }

    card.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      
      const isCurrentlyOpen = card.classList.contains("open");
      card.classList.toggle("open");
      
      if (isCurrentlyOpen) {
        isPaused = false;
        startAutoHover();
      } else {
        pauseAutoHover(card);
      }
    }, { passive: false });

    container.appendChild(card);
  });

  // ✅ تحديث قائمة الكروت وابدأ من الأول
  cards = Array.from(container.querySelectorAll('.card'));
  if (cards.length > 0) {
    startAutoHover();
  }
}

loadPosts();
</script>

</body>
</html>
