<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عرض المحاضرات المتعددة</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin:0; padding:0; font-family:'Poppins', sans-serif; }

body {
  min-height: 100vh;
  padding: 40px 20px;
  background: linear-gradient(135deg,#f83600,#f9d423);
  direction: rtl;
}

h1 {
  text-align: center;
  color: #fff;
  margin-bottom: 30px;
  font-size: 36px;
  font-weight: 600;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* كارد المحاضرة */
.card {
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  padding: 20px 25px;
  cursor: pointer;
  transition: all 0.3s ease;
  overflow: hidden;
  position: relative;
}

.card:hover { transform: translateY(-5px); }

.card-header {
  margin-bottom: 15px;
}

.card-title {
  font-size: 20px;
  font-weight: 600;
  color: #333;
  margin-bottom: 5px;
}

.card-date {
  font-size: 12px;
  color: #888;
}

/* المحتويات الداخلية مع الخط الجانبي */
.card-content-wrapper {
  position: relative;
  display: flex;
  flex-direction: row-reverse;
  gap: 15px;
}

.card-content {
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s ease;
  padding-left: 20px;
  border-left: 4px solid #f83600; /* الخط الجانبي الزاهي */
}

.card.open .card-content {
  max-height: 2000px; /* ارتفاع تقريبي للفتح */
}

/* كاردات صغيرة داخل الكارد الرئيسي */
.inner-card {
  background: #f9f9f9;
  border-radius: 12px;
  padding: 10px 15px;
  cursor: pointer;
  transition: all 0.3s ease;
  overflow: hidden;
}

.inner-card:hover { transform: translateX(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

.inner-card-title {
  font-weight: 600;
  color: #333;
}

.inner-card-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
  margin-top: 5px;
  text-align: right;
}

/* عند الفتح */
.inner-card.open .inner-card-content {
  max-height: 500px;
}

/* محتوى الوسائط */
.inner-card-content img, 
.inner-card-content video, 
.inner-card-content iframe {
  width: 100%;
  border-radius: 10px;
  margin-top: 5px;
}
</style>
</head>
<body>

<h1>المحاضرات</h1>
<div class="container" id="posts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA809gpxrpd1QSlWEH4wCjZHw3_aRai3gA",
  authDomain: "my-site-a4c05.firebaseapp.com",
  projectId: "my-site-a4c05"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadPosts() {
  const querySnapshot = await getDocs(collection(db, "posts"));
  const container = document.getElementById("posts");
  container.innerHTML = "";

  querySnapshot.forEach((doc) => {
    const post = doc.data();
    const dateStr = post.date ? new Date(post.date).toLocaleString() : null;

    // الكارد الرئيسي
    const card = document.createElement("div");
    card.className = "card";

    // الهيدر (عنوان + تاريخ)
    const headerHTML = `<div class="card-header">
                          <div class="card-title">${post.title || "بدون عنوان"}</div>
                          ${dateStr ? `<div class="card-date">تاريخ الرفع: ${dateStr}</div>` : ""}
                        </div>`;

    card.innerHTML = headerHTML + `<div class="card-content-wrapper">
                                     <div class="card-content"></div>
                                   </div>`;

    const cardContent = card.querySelector(".card-content");

    // إنشاء الكاردات الداخلية لكل نوع محتوى
    if(post.contents){
      for(const [type, value] of Object.entries(post.contents)){
        const inner = document.createElement("div");
        inner.className = "inner-card";
        inner.innerHTML = `<div class="inner-card-title">${type.toUpperCase()}</div>
                           <div class="inner-card-content"></div>`;
        const innerContent = inner.querySelector(".inner-card-content");

        if(type==="text") innerContent.innerHTML = `<p>${value}</p>`;
        else if(type==="image") innerContent.innerHTML = `<img src="${value}" alt="صورة">`;
        else if(type==="video") innerContent.innerHTML = `<video src="${value}" controls></video>`;
        else if(type==="pdf") innerContent.innerHTML = `<iframe src="${value}" style="height:400px;"></iframe>`;

        inner.addEventListener("click", (e)=>{
          e.stopPropagation();
          inner.classList.toggle("open");
          inner.scrollIntoView({behavior:"smooth", block:"start"});
        });

        cardContent.appendChild(inner);
      }
    }

    // فتح/إغلاق الكارد الرئيسي عند الضغط على أي مكان في الكارد
    card.addEventListener("click", () => {
      card.classList.toggle("open");
    });

    container.appendChild(card);
  });
}

loadPosts();
</script>

</body>
</html>
