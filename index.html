<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عرض المحاضرات</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin:0; padding:0; font-family:'Poppins', sans-serif; }

    body {
      min-height: 100vh;
      padding: 40px 20px;
      background: linear-gradient(135deg,#f83600,#f9d423);
    }

    h1 {
      text-align: center;
      color: #fff;
      margin-bottom: 30px;
      font-size: 36px;
      font-weight: 600;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      padding: 20px 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      overflow: hidden;
      position: relative;
    }

    .card:hover { transform: translateY(-5px); }

    .card-title {
      font-size: 20px;
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
    }

    .card-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }

    .card.open .card-content {
      max-height: 500px; /* ارتفاع تقريبي للفتح */
      margin-top: 10px;
    }

    .card img {
      max-width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .card p {
      color: #555;
      margin-bottom: 5px;
    }

    .card-date {
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>

<h1>المحاضرات</h1>
<div class="container" id="posts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA809gpxrpd1QSlWEH4wCjZHw3_aRai3gA",
  authDomain: "my-site-a4c05.firebaseapp.com",
  projectId: "my-site-a4c05"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadPosts() {
  const querySnapshot = await getDocs(collection(db, "posts"));
  const container = document.getElementById("posts");
  container.innerHTML = "";

  querySnapshot.forEach((doc) => {
    const post = doc.data();
    const dateStr = post.date ? new Date(post.date).toLocaleString() : null;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="card-title">${post.text || "بدون عنوان"}</div>
      <div class="card-content">
        ${post.image ? `<img src="${post.image}" alt="صورة المحاضرة">` : ""}
        ${dateStr ? `<p class="card-date">تاريخ الرفع: ${dateStr}</p>` : ""}
      </div>
    `;

    card.addEventListener("click", () => {
      card.classList.toggle("open");
    });

    container.appendChild(card);
  });
}

// تشغيل تلقائي عند تحميل الصفحة
loadPosts();
</script>

</body>
</html>
