<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رفع وحذف المحاضرات</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
  }

  body {
    min-height: 100vh;
    padding: 20px;
    direction: rtl;
    background: linear-gradient(135deg, #050a1c 0%, #0c1e36 100%);
    /* خلفية داكنة زرقاء ناعمة */
    color: #e0f0ff;
  }

  .top-buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 25px;
  }

  .top-buttons button {
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    font-weight: 600;
    color: #fff;
    background: linear-gradient(90deg, #00b4ff, #00f5d4);
    /* تدرج أزرق–تركوازي متوهج */
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0, 180, 255, 0.4);
    border: 1px solid rgba(0, 245, 212, 0.35);
  }

  .top-buttons button:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(0, 180, 255, 0.5);
  }

  section {
    display: none;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  section.active {
    display: block;
    opacity: 1;
  }

  .card {
    background: #0a1428;
    /* لون بطاقة داكن زرقاء–نيلي */
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    width: 100%;
    max-width: 560px;
    padding: 40px 30px;
    margin: 0 auto;
    text-align: center;
    position: relative;
    border: 1px solid rgba(0, 180, 255, 0.3);
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 20px;
    background: linear-gradient(135deg, transparent, rgba(0, 180, 255, 0.15));
    pointer-events: none;
    z-index: 1;
  }

  .card > * {
    position: relative;
    z-index: 2;
  }

  h2 {
    font-size: 28px;
    color: #00e0ff;
    /* أزرق تركوازي متوهج */
    margin-bottom: 25px;
    font-weight: 600;
    text-shadow: 0 0 8px rgba(0, 224, 255, 0.4);
  }

  .input-field, .file-label, .upload-btn {
    width: 100%;
  }

  .input-field {
    padding: 14px 18px;
    border-radius: 12px;
    border: 1px solid #2c3e50;
    background: rgba(15, 25, 40, 0.7);
    font-size: 15px;
    margin-bottom: 12px;
    color: #e0ffff;
    transition: all 0.3s ease;
  }

  .input-field:focus {
    border-color: #00b4ff;
    box-shadow: 0 0 10px rgba(0, 180, 255, 0.6);
    outline: none;
  }

  textarea.input-field {
    min-height: 100px;
    resize: vertical;
    
  }

  .file-label {
    display: block;
    padding: 12px 18px;
    background: linear-gradient(90deg, #00b4ff, #00f5d4);
    color: #fff;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    margin-bottom: 5px;
    transition: all 0.3s;
    text-align: center;
    box-shadow: 0 5px 12px rgba(0, 180, 255, 0.45);
  }

  .file-label:hover {
    background: linear-gradient(90deg, #00f5d4, #00b4ff);
    color: #fff;
    transform: translateY(-3px);
    box-shadow: 0 8px 16px rgba(0, 245, 212, 0.55);
  }

  .file-input {
    display: none;
  }

  .file-name {
    font-size: 13px;
    color: #9ee0ff;
    margin-bottom: 15px;
    text-align: right;
  }

  .checkbox-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #00b4ff;
  }

  label[for="includeDate"] {
    font-size: 14px;
    color: #a0d0ff;
  }

  .upload-btn {
    background: linear-gradient(90deg, #00b4ff, #00f5d4);
    padding: 15px 0;
    border: none;
    border-radius: 16px;
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 8px 20px rgba(0, 180, 255, 0.4);
  }

  .upload-btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 25px rgba(0, 245, 212, 0.55);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #0a1428;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
    margin-top: 10px;
    border: 1px solid rgba(0, 180, 255, 0.3);
  }

  table th {
    padding: 14px 15px;
    text-align: center;
    background: linear-gradient(90deg, #00b4ff, #00f5d4);
    color: #fff;
    font-weight: 600;
  }

  table td {
    padding: 12px 15px;
    text-align: center;
    border-bottom: 1px solid rgba(0, 180, 255, 0.2);
    color: #a0d0ff;
  }

  table tr:last-child td {
    border-bottom: none;
  }

  .delete-btn {
    padding: 8px 14px;
    border: none;
    border-radius: 8px;
    background: #ff6584;
    /* وردي/وردي خفيف متوهج */
    color: #fff;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.3s;
    box-shadow: 0 3px 8px rgba(255, 101, 132, 0.3);
  }

  .delete-btn:hover {
    background: #ff4764;
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(255, 71, 100, 0.4);
  }

  #delete-section h2 {
    text-align: center;
    color: #00e0ff;
    margin-bottom: 20px;
    font-size: 26px;
    font-weight: 600;
    text-shadow: 0 0 10px rgba(0, 224, 255, 0.4);
  }

  /* تفاصيل نهائية للون المتوهج */
  .top-buttons button,
  .file-label,
  .upload-btn,
  .delete-btn {
    border: 1px solid rgba(255, 255, 255, 0.2);
  }
</style>
</head>
<body>

<div class="top-buttons">
  <button id="show-upload">رفع محاضرة</button>
  <button id="show-delete">حذف محاضرة</button>
</div>

<!-- صفحة الرفع -->
<section id="upload-section" class="active">
  <div class="card">
    <h2>رفع محاضرة</h2>
    <input type="text" id="title" class="input-field" placeholder="عنوان المحاضرة">
    <textarea id="textContent" class="input-field" placeholder="أدخل نص المحاضرة" rows="3"></textarea>

    <label for="imageFile" class="file-label">اختر صورة</label>
    <input type="file" id="imageFile" class="file-input" accept="image/*">
    <div class="file-name" id="imageName">لم يتم اختيار أي صورة</div>

    <label for="videoFile" class="file-label">اختر فيديو</label>
    <input type="file" id="videoFile" class="file-input" accept="video/*">
    <div class="file-name" id="videoName">لم يتم اختيار أي فيديو</div>

    <label for="pdfFile" class="file-label">اختر ملف PDF</label>
    <input type="file" id="pdfFile" class="file-input" accept=".pdf">
    <div class="file-name" id="pdfName">لم يتم اختيار أي PDF</div>

    <div class="checkbox-container">
      <input type="checkbox" id="includeDate">
      <label for="includeDate">أضف تاريخ الرفع</label>
    </div>

    <button class="upload-btn" onclick="upload()">نشر</button>
  </div>
</section>

<!-- صفحة الحذف -->
<section id="delete-section">
  <h2 style="text-align:center; color:#fff; margin-bottom:20px;">حذف المحاضرات</h2>
  <table>
    <thead>
      <tr>
        <th>العنوان</th>
        <th>تاريخ</th>
        <th>حذف</th>
      </tr>
    </thead>
    <tbody id="posts-delete"></tbody>
  </table>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, addDoc, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA809gpxrpd1QSlWEH4wCjZHw3_aRai3gA",
  authDomain: "my-site-a4c05.firebaseapp.com",
  projectId: "my-site-a4c05"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// زرارين تغيير الصفحات
const uploadSection = document.getElementById("upload-section");
const deleteSection = document.getElementById("delete-section");
document.getElementById("show-upload").addEventListener("click", ()=>{
  uploadSection.classList.add("active");
  deleteSection.classList.remove("active");
});
document.getElementById("show-delete").addEventListener("click", ()=>{
  uploadSection.classList.remove("active");
  deleteSection.classList.add("active");
  loadPostsForDelete();
});

// متابعة أسماء الملفات
function handleFile(inputId, nameId){
  const input = document.getElementById(inputId);
  const nameEl = document.getElementById(nameId);
  input.addEventListener('change', () => {
    nameEl.textContent = input.files.length > 0 ? input.files[0].name : `لم يتم اختيار أي ${id.includes("image") ? "صورة" : id.includes("video") ? "فيديو" : "PDF"}`;
  });
}
handleFile("imageFile","imageName");
handleFile("videoFile","videoName");
handleFile("pdfFile","pdfName");

// رفع الملفات على Cloudinary
async function uploadToCloudinary(file, type){
  if(!file) return null;
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "my_preset");
  const url = type==="video" ? "https://api.cloudinary.com/v1_1/dyml1sor9/video/upload" : "https://api.cloudinary.com/v1_1/dyml1sor9/image/upload";
  const res = await fetch(url, { method: "POST", body: formData });
  const data = await res.json();
  return data.secure_url;
}

window.upload = async function(){
  const title = document.getElementById("title").value;
  const textContent = document.getElementById("textContent").value;
  const includeDate = document.getElementById("includeDate").checked;

  const imageFile = document.getElementById("imageFile").files[0];
  const videoFile = document.getElementById("videoFile").files[0];
  const pdfFile = document.getElementById("pdfFile").files[0];

  if(!title && !textContent && !imageFile && !videoFile && !pdfFile){
    alert("اختر محتوى أو اكتب عنوان!");
    return;
  }

  const docData = { title, contents: {} };
  if(includeDate) docData.date = new Date().toISOString();

  if(textContent) docData.contents.text = textContent;
  if(imageFile) docData.contents.image = await uploadToCloudinary(imageFile,"image");
  if(videoFile) docData.contents.video = await uploadToCloudinary(videoFile,"video");
  if(pdfFile) docData.contents.pdf = await uploadToCloudinary(pdfFile,"file");

  await addDoc(collection(db,"posts"), docData);

  alert("تم النشر 🔥");

  document.getElementById("title").value = "";
  document.getElementById("textContent").value = "";
  ["imageFile","videoFile","pdfFile"].forEach(id=>document.getElementById(id).value="");
  ["imageName","videoName","pdfName"].forEach(id=>document.getElementById(id).textContent = `لم يتم اختيار أي ${id.includes("image") ? "صورة" : id.includes("video") ? "فيديو" : "PDF"}`);
  document.getElementById("includeDate").checked = false;
};

// تحميل المحاضرات لصفحة الحذف
async function loadPostsForDelete(){
  const tbody = document.getElementById("posts-delete");
  tbody.innerHTML = "";
  const snapshot = await getDocs(collection(db,"posts"));
  snapshot.forEach(docSnap=>{
    const post = docSnap.data();
    const date = post.date ? new Date(post.date).toLocaleString() : "-";

    const tr = document.createElement("tr");

    const tdTitle = document.createElement("td");
    tdTitle.textContent = post.title || "-";

    const tdDate = document.createElement("td");
    tdDate.textContent = date;

    const tdDelete = document.createElement("td");
    const delBtn = document.createElement("button");
    delBtn.textContent = "حذف";
    delBtn.className = "delete-btn";
    delBtn.addEventListener("click", async ()=>{
      if(confirm("هل أنت متأكد من حذف هذه المحاضرة؟")){
        await deleteDoc(doc(db,"posts",docSnap.id));
        alert("تم الحذف 🔥");
        loadPostsForDelete();
      }
    });
    tdDelete.appendChild(delBtn);

    tr.appendChild(tdTitle);
    tr.appendChild(tdDate);
    tr.appendChild(tdDelete);
    tbody.appendChild(tr);
  });
}
</script>
</body>
</html>
