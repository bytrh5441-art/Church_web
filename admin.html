<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رفع بوست عصري</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #333;
    }

    .card {
      background: #fff;
      width: 100%;
      max-width: 450px;
      border-radius: 20px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
      padding: 40px 30px;
      text-align: center;
      position: relative;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 25px;
      color: #333;
    }

    input[type="text"] {
      width: 100%;
      padding: 15px 20px;
      margin: 15px 0;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    input[type="text"]:focus {
      border-color: #764ba2;
      box-shadow: 0 0 10px rgba(118,75,162,0.3);
      outline: none;
    }

    input[type="file"] {
      display: none;
    }

    .file-label {
      display: inline-block;
      background: #764ba2;
      color: #fff;
      padding: 12px 25px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.3s;
      margin-bottom: 20px;
    }

    .file-label:hover {
      background: #667eea;
    }

    .progress-container {
      width: 100%;
      height: 20px;
      background: #eee;
      border-radius: 10px;
      overflow: hidden;
      margin: 15px 0;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #764ba2;
      text-align: center;
      color: white;
      line-height: 20px;
      border-radius: 10px 0 0 10px;
      transition: width 0.3s ease;
    }

    .upload-btn {
      background: #667eea;
      color: #fff;
      padding: 15px 30px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .upload-btn:hover {
      background: #764ba2;
      transform: translateY(-3px);
    }

    .file-name {
      margin-top: 10px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>رفع بوست</h2>
  <input type="text" id="text" placeholder="اكتب نصك هنا">

  <label for="file" class="file-label">اختر ملف</label>
  <input type="file" id="file">
  <div class="file-name" id="fileName">لم يتم اختيار أي ملف</div>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar">0%</div>
  </div>

  <button class="upload-btn" onclick="upload()">نشر</button>
</div>

<script type="module">
const fileInput = document.getElementById('file');
const fileName = document.getElementById('fileName');
const progressBar = document.getElementById('progressBar');

// عرض اسم الملف بعد الاختيار
fileInput.addEventListener('change', () => {
  if(fileInput.files.length > 0){
    fileName.textContent = fileInput.files[0].name;
  } else {
    fileName.textContent = 'لم يتم اختيار أي ملف';
  }
});

// دالة وهمية للرفع مع شريط تقدم
export function upload() {
  if (!fileInput.files.length) {
    alert('اختر ملف أولاً');
    return;
  }

  let progress = 0;
  progressBar.style.width = '0%';
  progressBar.textContent = '0%';

  const interval = setInterval(() => {
    if (progress >= 100) {
      clearInterval(interval);
      progressBar.textContent = 'تم الرفع!';
      progressBar.style.borderRadius = '10px';
      return;
    }
    progress += 5;
    progressBar.style.width = progress + '%';
    progressBar.textContent = progress + '%';
  }, 100);
}
</script>

</body>
</html>
