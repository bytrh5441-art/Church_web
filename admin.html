<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رفع بوست عصري</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      width: 100%;
      max-width: 450px;
      border-radius: 25px;
      padding: 40px 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      position: relative;
      text-align: center;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h2 {
      font-size: 28px;
      margin-bottom: 30px;
      color: #333;
    }

    .input-field {
      width: 100%;
      padding: 15px 20px;
      margin-bottom: 20px;
      border-radius: 15px;
      border: 1px solid #ccc;
      font-size: 16px;
      transition: 0.3s;
    }

    .input-field:focus {
      border-color: #6a11cb;
      box-shadow: 0 0 10px rgba(106,17,203,0.3);
      outline: none;
    }

    .file-label {
      display: block;
      width: fit-content;
      margin: 0 auto 15px;
      background: #6a11cb;
      color: #fff;
      padding: 12px 25px;
      border-radius: 15px;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
    }

    .file-label:hover {
      background: #2575fc;
      transform: translateY(-2px);
    }

    .file-name {
      margin-bottom: 20px;
      font-size: 14px;
      color: #555;
    }

    .upload-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 15px;
      background: linear-gradient(90deg, #6a11cb, #2575fc);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
    }

    .upload-btn:hover {
      background: linear-gradient(90deg, #2575fc, #6a11cb);
      transform: translateY(-3px);
    }

    /* لمسة إضافية */
    .card::before {
      content: '';
      position: absolute;
      top: -20px;
      right: -20px;
      width: 80px;
      height: 80px;
      background: rgba(106,17,203,0.2);
      border-radius: 50%;
    }

    .card::after {
      content: '';
      position: absolute;
      bottom: -25px;
      left: -25px;
      width: 100px;
      height: 100px;
      background: rgba(37,117,252,0.2);
      border-radius: 50%;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>رفع بوست</h2>
  <input type="text" id="text" class="input-field" placeholder="اكتب نصك هنا">

  <label for="file" class="file-label">اختر ملف</label>
  <input type="file" id="file" style="display:none;">
  <div class="file-name" id="fileName">لم يتم اختيار أي ملف</div>

  <button class="upload-btn" onclick="upload()">نشر</button>
</div>

<script type="module">
const fileInput = document.getElementById('file');
const fileName = document.getElementById('fileName');

fileInput.addEventListener('change', () => {
  if(fileInput.files.length > 0){
    fileName.textContent = fileInput.files[0].name;
  } else {
    fileName.textContent = 'لم يتم اختيار أي ملف';
  }
});

// دالة وهمية للنشر
export function upload() {
  const text = document.getElementById('text').value;
  if (!text && !fileInput.files.length) {
    alert('اكتب نص أو اختر ملف أولاً');
    return;
  }
  alert('تم النشر بنجاح! (وهمي)');
}
</script>

</body>
</html>
